<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinTech — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #16161f;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
      --text: #f0f0f5; --text-muted: #888899;
      --accent: #7c6ff7; --accent2: #5b8df8;
      --green: #3ecf8e; --red: #f06375;
    }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,111,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,111,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .auth-wrap { width: 100%; max-width: 440px; position: relative; }

    .logo-row {
      text-align: center; margin-bottom: 2rem;
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #fff;
      margin-bottom: 10px;
    }
    .logo-name {
      display: block; font-size: 26px; font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-tagline { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

    .auth-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
    }

    /* Tab switcher */
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--bg2); border-radius: 10px;
      padding: 4px; margin-bottom: 1.8rem;
      border: 1px solid var(--border);
    }
    .tab-btn {
      padding: 9px; text-align: center;
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 600;
      border: none; background: none; color: var(--text-muted);
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }

    /* Form */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
    input, select {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Sora', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus, select:focus {
      border-color: rgba(124,111,247,0.5); background: rgba(124,111,247,0.05);
    }
    select option { background: #1a1a28; }

    .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #fff; font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 0.5rem; transition: all 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(240,99,117,0.1); border: 1px solid rgba(240,99,117,0.3);
      color: var(--red); border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 1rem; display: none;
    }
    .success-msg {
      background: rgba(62,207,142,0.1); border: 1px solid rgba(62,207,142,0.3);
      color: var(--green); border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 1rem; display: none;
    }

    .divider { text-align: center; color: var(--text-muted); font-size: 12px; margin: 1.2rem 0; }

    .features {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; margin-top: 1.5rem;
    }
    .feature-pill {
      background: rgba(124,111,247,0.1); border: 1px solid rgba(124,111,247,0.2);
      color: var(--text-muted); border-radius: 999px;
      padding: 5px 12px; font-size: 12px;
    }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="logo-row">
    <div class="logo-icon">₹</div>
    <span class="logo-name">FinTech</span>
    <p class="logo-tagline">Smart Finance Advisor for India</p>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn"       onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Error / Success messages -->
    <div class="error-msg"   id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="form-login">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')submitLogin()"/>
      </div>
      <button class="btn-submit" id="btn-login" onclick="submitLogin()">Sign In to FinTech</button>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-section" id="form-register">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="e.g. Aarav Singh"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password (min 6 characters)</label>
        <input type="password" id="reg-password" placeholder="Choose a strong password"/>
      </div>
      <div class="form-group">
        <label>City Type</label>
        <select id="reg-city">
          <option value="metro">Metro city (Delhi, Mumbai, Bangalore)</option>
          <option value="tier2">Tier-2 city (Pune, Jaipur, etc.)</option>
          <option value="small">Small town / Rural</option>
        </select>
      </div>
      <button class="btn-submit" id="btn-register" onclick="submitRegister()">Create My Account →</button>
    </div>

    <div class="divider">✦ Your data is stored securely ✦</div>

    <div class="features">
      <span class="feature-pill">📊 Budget Tracking</span>
      <span class="feature-pill">🎯 Goal Planner</span>
      <span class="feature-pill">🤖 AI Advisor</span>
      <span class="feature-pill">📈 SIP Calculator</span>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = 'index.html';

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', ['login','register'][i] === tab));
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }
  function hideMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> Please wait...' : btn.dataset.label;
  }

  document.getElementById('btn-login').dataset.label    = 'Sign In to FinTech';
  document.getElementById('btn-register').dataset.label = 'Create My Account →';

  async function submitLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }

    setLoading('btn-login', true);
    try {
      const data = await AuthAPI.login(email, password);
      showSuccess(`Welcome back, ${data.user.name}! Redirecting...`);
      setTimeout(() => window.location.href = 'index.html', 1000);
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading('btn-login', false);
    }
  }

  async function submitRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const city     = document.getElementById('reg-city').value;
    if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

    setLoading('btn-register', true);
    try {
      const data = await AuthAPI.register(name, email, password, city);
      showSuccess(`Account created! Welcome, ${data.user.name}! Redirecting...`);
      setTimeout(() => window.location.href = 'index.html', 1200);
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading('btn-register', false);
    }
  }
</script>
</body>
</html>
